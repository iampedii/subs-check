# Whether to show progress.
print-progress: true

# Concurrent worker count. The alive-check stage uses this value.
concurrent: 50
# Media-check concurrency. Defaults to concurrent.
media-concurrent: 20
# Speed-test concurrency. Defaults to concurrent.
# A lower value is recommended to avoid bandwidth contention and inaccurate results.
speed-concurrent: 20
# Minimum delay before each outbound proxy dial, globally across all check stages.
# 0 disables pacing. If your provider warned you about network scans, set this
# to 1000-3000 and reduce concurrent/media-concurrent/speed-concurrent.
probe-interval-ms: 0
# Maximum candidate proxy nodes to test in one run after deduplication.
# 0 means unlimited. Use this with probe-interval-ms to avoid checking a large
# public list in one burst.
max-probes-per-run: 0
# Whether to shuffle node test order. This only affects test timing; output
# still preserves the original subscription order.
# This can prevent adjacent provider nodes or multiple protocols of the same
# node from being tested in the same time window, reducing interference.
shuffle-test-order: true
# Check interval in minutes.
# Must be greater than 0; values <= 0 are treated as 1 minute.
check-interval: 120
# Cron expression. If configured, check-interval is ignored.
# Standard cron expressions are supported, for example:
# "0 */2 * * *" runs every 2 hours on the hour.
# "0 0 */2 * *" runs every 2 days at 00:00.
# "0 0 1 * *" runs at 00:00 on the first day of every month.
# "*/30 * * * *" runs every 30 minutes.
# cron-expression: "*/30 * * * *"

# Number of successful nodes to keep. 0 means unlimited.
# If concurrency is greater than this value, successful results may exceed it:
# success-limit <= success <= success-limit+concurrent
success-limit: 0

# Timeout in milliseconds. This is the maximum allowed node latency.
timeout: 5000
# Latency test URL.
# Advanced usage is up to you. For example, to reject some CF-like nodes,
# replace this URL with https://www.cloudflare.com.
alive-test-url: http://gstatic.com/generate_204
# Speed-test URL. Make sure concurrency * node speed is below your maximum
# bandwidth; otherwise results will be inaccurate.
# Avoid Speedtest or Cloudflare download links when possible because many nodes
# block speed-test sites. If you cannot find a stable URL, host your own.
speed-test-url: https://github.com/AaronFeng753/Waifu2x-Extension-GUI/releases/download/v2.21.12/Waifu2x-Extension-GUI-v2.21.12-Portable.7z
# Discard nodes below this speed-test result (KB/s).
min-speed: 512
# Download test duration in seconds. Related to the download file size; default maximum is 10s.
download-timeout: 10
# Per-node speed-test download size limit in MB. 0 means unlimited.
download-mb: 20
# Total download speed limit in MB/s. 0 means unlimited.
total-speed-limit: 0

# Listen port, used to directly serve node information for subscription conversion.
# http://127.0.0.1:8199/all.yaml
# Note: the default listens on 0.0.0.0:8199 for ease of use. Change it if needed.
# Restart the program after changing this value.
listen-port: ":8199"

# Rename nodes by looking up their IP location.
# Low-quality nodes may cause IP lookup failures and slightly slow the whole check. Default: true.
rename-node: true
# Node prefix. Only effective when rename-node is true.
node-prefix: ""
# Optional node-name template. When set, it overrides the built-in node name.
# Supported placeholders: {Flag}, {CountryFlag}, {Country}, {Index}, {ShortID}, {Name}, {ActualName}, {Speed}, {Tags}
# {ShortID} is country plus per-country index, such as US1, DE2, or OT3.
# {Speed} is empty unless speed-test-url is set and the node passes speed testing.
node-name-template: ""

# Test only nodes with selected protocols.
node-type:
  # - ss
  # - vmess
  # - vless

# Node-name filters. Only nodes matching at least one regex are kept.
# Empty means no filtering; all nodes that pass checks are kept.
# Filtering happens after media checks + renaming and before speed testing. At
# that point names contain country and media tags such as NF-US, GPT+, and IP
# risk percentage, but not speed tags. Speed tags are appended only after speed
# testing and do not participate in filtering.
filter:
  # === Filter by region ===
  # - "HK|Hong Kong"             # Keep Hong Kong nodes.
  # - "SG|Singapore"             # Keep Singapore nodes.
  # - "TW|Taiwan"                # Keep Taiwan nodes.
  #
  # === Filter by IP risk (requires media-check and iprisk) ===
  # - "\\|[0-4]?[0-9]%"          # Keep nodes with IP risk < 50%.
  # - "\\|[0-9]%\\|"             # Keep nodes with IP risk < 10% (single digit).
  #
  # === Filter by platform unlock (requires media-check) ===
  # - "GPT⁺|GPT"                 # Keep nodes that unlock OpenAI.
  # - "NF"                       # Keep nodes that unlock Netflix (NF=Originals only, NF-US=full unlock).
  # - "GM"                       # Keep nodes that unlock Gemini.
  # - "D\\+"                     # Keep nodes that unlock Disney+.
  # - "YT-"                      # Keep nodes that unlock YouTube Premium.
  # - "CL-"                      # Keep nodes that unlock Claude.
  # - "SP-"                      # Keep nodes that unlock Spotify.

# Whether to enable media checks. IP fraud checks depend on renaming.
media-check: false
# Media-check timeout in seconds. Defaults to 10 seconds when unset.
media-check-timeout: 5
platforms:
  - iprisk
  - tiktok
  - youtube
  - netflix
  - disney
  - openai
  - gemini
  - claude
  - spotify

# Keep usable historical nodes from the last N days.
# When enabled, each check saves a node snapshot under output/history/.
# The next check adds historical nodes to the queue and tests them again; only
# passing nodes are kept in output. Expired history files are cleaned automatically.
# 0 disables this feature.
keep-days: 0

# Output directory.
# If empty, the config directory under the program directory is used.
output-dir: ""

# Whether to enable the web control panel.
# If false, the web UI is not started; only subscription-service APIs run.
# URL: http://127.0.0.1:8199/admin
enable-web-ui: true
# API key for the web control panel. If empty, one is generated automatically.
# When the config value is empty, API_KEY can also be set through the environment.
api-key: ""

# Path to a callback script that runs after checks complete.
# The script can be used for custom notifications or other actions.
# Examples: "/path/to/your/script.sh" or 'C:\path\to\your\script.bat'
# On Linux, add a shebang at the start, such as #!/bin/bash, #!/bin/sh, or #!/usr/bin/env bash.
# Docker currently uses Alpine and only provides sh, not bash.
callback-script: ""

# Apprise API server URL.
# https://notify.xxxx.us.kg/notify
apprise-api-server: ""
# Notification targets.
# Supports 100+ notification channels. See https://github.com/caronc/apprise for formats.
recipient-url: 
  # Telegram format: tgram://{bot_token}/{chat_id}
  # - tgram://xxxxxx/-1002149239223
  # DingTalk format: dingtalk://{Secret}@{ApiKey}
  # - dingtalk://xxxxxx@xxxxxxx
# Custom notification title.
notify-title: "🔔 Node Status Update"

# sub-store startup port. Empty means sub-store will not start.
# Restart after changing this value. Do not listen on LAN IPs. Valid forms:
# :8299, 127.0.0.1:8299, or 0.0.0.0:8299.
# sub-store-port: ":8299"
sub-store-port: ":8299"
# Custom sub-store access path. Must start with /. Future subscription access must include this path.
# After setting a path, subscription sharing can be enabled without exposing the real path.
# sub-store-path: "/path"
sub-store-path: ""
# For the following settings, see sub-store docs: https://hub.docker.com/r/xream/sub-store
# sub-store scheduled Gist sync.
# This uploads subscriptions/files to a private Gist on schedule. In the frontend
# it is called sync or sync config.
# 55 23 * * * means 23:55 every day, avoiding provider backends that restart at 00:00.
sub-store-sync-cron: ""
# Scheduled subscription updates.
# SUB_STORE_PRODUCE_CRON processes subscriptions in the background.
# Format: 0 */2 * * *,sub,a;0 */3 * * *,col,b
# This means process single subscription a every 2 hours and collection b every 3 hours.
sub-store-produce-cron: ""
# sub-store push service URL.
# Example for Bark: "SUB_STORE_PUSH_SERVICE=https://api.day.app/XXXXXXXXXXXX/[Push Title]/[Push Content]"
# Only replace XXXXXXXXXXXX with your token. [Push Title]/[Push Content] are replaced by sub-store.
sub-store-push-service: ""


# Override subscription URL used to generate mihomo/clash.meta subscription links with rules.
# This is now bundled to avoid network issues and depends on port :8199.
# To use another custom override file, place it in the output directory and
# change the suffix of this URL.
mihomo-overwrite-url: "http://127.0.0.1:8199/sub/ACL4SSR_Online_Full.yaml"

# Save method. Supported values: r2, local, gist, webdav, s3.
save-method: local

# webdav
webdav-url: "https://example.com/dav/"
webdav-username: "admin"
webdav-password: "admin"

# gist id
github-gist-id: ""
# github token
github-token: ""
# github api mirror
github-api-mirror: ""

# Worker URL for pushing speed-test results.
worker-url: https://example.worker.dev
# Worker token.
worker-token: 1234567890

# S3/Minio endpoint for pushing speed-test results.
s3-endpoint: "127.0.0.1:9000"
# S3 access credentials.
s3-access-id: "ak"
s3-secret-key: "sk"
# S3 bucket name.
s3-bucket: "public"
# Whether to use SSL.
s3-use-ssl: false
# Defaults to auto-detecting DNS-style or path-style bucket lookup. Some cloud
# providers do not follow the standard, so manual setting is sometimes needed.
# Options: auto, path, dns.
s3-bucket-lookup: "auto"

# Retry count after subscription fetch failure.
sub-urls-retry: 3
# Subscription download concurrency. Controls how many subscription URLs are fetched at once.
sub-urls-concurrent: 20
# User-Agent for fetching subscriptions. Set to random to use a random UA.
# sub-urls-get-ua: "random"
sub-urls-get-ua: "clash.meta (https://github.com/beck-8/subs-check)"
# GitHub proxy used for fetching subscriptions. Must end with /.
# github-proxy: "https://ghfast.top/"
github-proxy: ""
# General proxy for fetching proxies, sending messages, uploading files, and more.
# Syntax matches environment variables. Restart required after changes.
# proxy: "http://username:password@192.168.1.1:7890"
# proxy: "socks5://username:password@192.168.1.1:7890"
proxy: ""
# Required success-rate ratio. Subscriptions below this value are printed to help debug low-quality sources.
success-rate: 0

# DNS configuration. Supports udp/tcp/tls/https/quic.
# enable=false uses mihomo defaults (system DNS + IPv4 only); ipv6=true allows IPv6 resolution.
# When enable=true, the three fields can be empty and fall back in this chain:
# proxy-server-nameserver -> nameserver -> default-nameserver.
# default-nameserver is used for bootstrap and must contain plain IPs.
dns:
  enable: false
  ipv6: false
  nameserver:
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

# Remote subscription list URLs. Use this to centrally maintain multiple
# subscription links without frequently editing local files.
# Supported formats:
# 1) Plain text: one per line, with # comments and blank lines.
# 2) YAML/JSON: string array ["https://...", "https://..."].
# Supports time placeholders and github-proxy, for example {Ymd} and {Y-m-d}.
sub-urls-remote:
  # - https://example.com/sub-list.txt
  # - https://example.com/sub-list.yaml
  - https://raw.githubusercontent.com/beck-8/sub-urls/refs/heads/main/%E5%B0%8F%E8%80%8C%E7%BE%8E.txt

# Subscription URLs. Supports clash/mihomo/v2ray/base64 subscription links.
# To explicitly use the clash type, append &flag=clash.meta to supported URLs.
# Add ghproxy to GitHub links yourself if needed. HTTP_PROXY and HTTPS_PROXY are
# supported for accelerating subscription fetches.
# To distinguish node sources, append #remark to the subscription URL. The remark
# is automatically added to the end of node names.
sub-urls:
  # - https://example.com/sub.txt
  # - https://example.com/sub2.txt
  # - https://example.com/sub?token=43fa8f0dc9bb00dcfec2afb21b14378a
  # - https://example.com/sub?token=43fa8f0dc9bb00dcfec2afb21b14378a?flag=clash.meta
    # All time placeholders support ±N day offsets, such as {Ymd-1} for yesterday and {Y-m-d+1} for tomorrow.
  # - https://raw.githubusercontent.com/example/repo/main/config/{Ymd}.yaml
  # - https://raw.githubusercontent.com/example/repo/main/daily/daily-{Y}-{m}-{d}.yaml
  # - https://raw.githubusercontent.com/example/repo/main/config/{Ymd-1}.yaml
  # - https://raw.githubusercontent.com/example/repo/main/daily/daily-{Y-m-d+1}.yaml
  # - https://example.com/sub.txt#my-remark
  # Enable this to test previously usable nodes again.
  # - "http://127.0.0.1:8199/sub/all.yaml"
  - "https://raw.githubusercontent.com/firefoxmmx2/v2rayshare_subcription/main/subscription/clash_sub.yaml"
  - "https://raw.githubusercontent.com/Q3dlaXpoaQ/V2rayN_Clash_Node_Getter/refs/heads/main/APIs/sc0.yaml"
  - "https://raw.githubusercontent.com/mahdibland/SSAggregator/master/sub/sub_merge_yaml.yml"
  - "https://raw.githubusercontent.com/snakem982/proxypool/main/source/clash-meta.yaml"
  - "https://raw.githubusercontent.com/chengaopan/AutoMergePublicNodes/master/list.yml"
  - "https://raw.githubusercontent.com/zhangkaiitugithub/passcro/main/speednodes.yaml"
  - "https://raw.githubusercontent.com/aiboboxx/v2rayfree/refs/heads/main/README.md"
  - "https://raw.githubusercontent.com/peasoft/NoMoreWalls/master/snippets/nodes.meta.yml"
  - "https://raw.githubusercontent.com/Ruk1ng001/freeSub/main/clash.yaml"
  - "https://raw.githubusercontent.com/SoliSpirit/v2ray-configs/main/all_configs.txt"
  - "https://raw.githubusercontent.com/ripaojiedian/freenode/main/clash"
  - "https://raw.githubusercontent.com/go4sharing/sub/main/sub.yaml"
  - https://raw.githubusercontent.com/actionsfz/v2ray/refs/heads/master/all.yaml
  - https://raw.githubusercontent.com/Pawdroid/Free-servers/refs/heads/main/sub
  - https://raw.githubusercontent.com/acymz/AutoVPN/main/data/V2.txt
  - https://raw.githubusercontent.com/Barabama/FreeNodes/main/nodes/wenode.txt
  - https://raw.githubusercontent.com/Barabama/FreeNodes/main/nodes/v2rayshare.txt
  - https://raw.githubusercontent.com/Barabama/FreeNodes/main/nodes/nodefree.txt
  - https://raw.githubusercontent.com/Barabama/FreeNodes/main/nodes/ndnode.txt
  - https://raw.githubusercontent.com/Barabama/FreeNodes/main/nodes/clashmeta.txt
  - https://raw.githubusercontent.com/xiaoji235/airport-free/main/v2ray.txt
